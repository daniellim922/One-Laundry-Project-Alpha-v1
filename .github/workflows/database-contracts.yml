name: Database Contracts

on:
  pull_request:
    paths:
      - ".github/workflows/database-contracts.yml"
      - "package.json"
      - "package-lock.json"
      - "lib/database/**"
      - "db/**"
      - "drizzle.config.ts"
      - "supabase/**"
      - "README.md"
      - "AGENTS.md"
      - ".env.example"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/database-contracts.yml"
      - "package.json"
      - "package-lock.json"
      - "lib/database/**"
      - "db/**"
      - "drizzle.config.ts"
      - "supabase/**"
      - "README.md"
      - "AGENTS.md"
      - ".env.example"

jobs:
  database-contracts:
    name: Database Contract Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lightweight database contract suite
        run: npm run test:db:contracts
