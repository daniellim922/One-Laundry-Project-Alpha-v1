# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "one-laundry"

[api]
enabled = true
port = "env(LOCAL_SUPABASE_API_PORT)"
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = "env(LOCAL_SUPABASE_DB_PORT)"
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = false

[analytics]
enabled = false

[studio]
enabled = true
api_url = "env(LOCAL_SUPABASE_STUDIO_URL)"
port = "env(LOCAL_SUPABASE_STUDIO_PORT)"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326
admin_email = "auth@one-laundry.local"
sender_name = "One Laundry Local Auth"

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000",
  "http://localhost:3000/auth/callback",
]
enable_signup = false

# GoTrue maps this to enabling the email *provider* (sign-in), not only public signup.
# Keep [auth].enable_signup = false for invite-only / no self-serve registration.
[auth.email]
enable_signup = true
